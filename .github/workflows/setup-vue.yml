name: Setup Vue Project
on:
  workflow_dispatch:
jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Create Vite project
        run: |
          npm create vite@latest temp-vue -- --template vue
          cp -r temp-vue/. .
          rm -rf temp-vue
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "init: Vue + Vite setup"
          git push

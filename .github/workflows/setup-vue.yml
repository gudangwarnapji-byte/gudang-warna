name: Setup Vue Project
on:
  workflow_dispatch:
jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install dependencies & update lock file
        run: npm install
      - name: Build
        run: npm run build
      - name: Commit updated lock file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add package-lock.json
          git commit -m "fix: update package-lock.json" || echo "No changes"
          git push

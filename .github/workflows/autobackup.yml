# File: .github/workflows/autobackup.yml
name: 🗄️ Auto Backup Database Firebase

on:
  schedule:
    - cron: '0 17 * * *'
  
  workflow_dispatch:

jobs:
  backup-job:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Tarik Kode Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node.js Lingkungan Robot
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Install Firebase Admin SDK
        run: npm install firebase-admin

      - name: 🚀 Jalankan Script Backup & Kompresi
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: |
          # 1. Jalankan script nodejs lo buat narik JSON
          node src/scripts/backup.js
          
          # 2. Kompres semua file .json jadi .gz (Menyusut 90%!)
          gzip -f database-backups/*.json
          
          # 3. Hapus otomatis file backup yang udah lebih tua dari 30 hari
          find database-backups/ -name "*.gz" -type f -mtime +30 -delete

      - name: 💾 Commit & Push Hasil Backup ke Repo
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Pakai -A biar Git sadar kalau ada file lama yang dihapus/dikompres
          git add -A database-backups/
          git commit -m "🗄️ Auto-backup & Cleanup: $(date +'%Y-%m-%d')" || echo "Tidak ada perubahan data"
          
          # Jurus Sapu Jagat
          git reset --hard
          git clean -fd
          
          # Sinkronisasi & Push
          git pull origin main --rebase
          git push origin HEAD:main
